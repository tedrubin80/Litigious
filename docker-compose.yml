# Litigious — Docker Compose (local / self-host)

services:
  postgres:
    image: postgres:16-alpine
    container_name: litigious-postgres
    environment:
      POSTGRES_USER: litigious
      POSTGRES_PASSWORD: litigious
      POSTGRES_DB: litigious
    ports:
      - "5432:5432"
    volumes:
      - litigious_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litigious"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - litigious

  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/docker/Dockerfile.backend
    container_name: litigious-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://litigious:litigious@postgres:5432/litigious
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000
      DEMO_MODE: ${DEMO_MODE:-true}
      DEMO_AUTO_RESET: ${DEMO_AUTO_RESET:-true}
      DEMO_RESET_INTERVAL_HOURS: ${DEMO_RESET_INTERVAL_HOURS:-24}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - litigious

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/docker/Dockerfile.frontend
    container_name: litigious-web
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001/api
      VITE_DEMO_MODE: ${VITE_DEMO_MODE:-true}
    depends_on:
      - backend
    networks:
      - litigious

volumes:
  litigious_pg:

networks:
  litigious:
    driver: bridge
