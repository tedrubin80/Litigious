name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npm test -- --passWithNoTests --testPathPatterns="basic-validation|auth.mock|access-scope"
        env:
          JWT_SECRET: ci-test-jwt-secret-min-32-characters-long
          SESSION_SECRET: ci-test-session-secret-min-32-chars
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npm run build
      - run: npm run test:ci
